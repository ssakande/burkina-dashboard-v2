<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Humanitaire - Burkina Faso</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #root {
            min-height: 100vh;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #EFF6FF 0%, #E0E7FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #loading-content {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .spinner {
            border: 4px solid #E0E7FF;
            border-top: 4px solid #6366F1;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .leaflet-container {
            font-family: inherit;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        #error-message {
            color: #DC2626;
            font-weight: bold;
            margin-top: 10px;
            padding: 10px;
            background: #FEE2E2;
            border-radius: 8px;
            font-size: 13px;
        }

        .loading-step {
            font-size: 14px;
            color: #6B7280;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Écran de chargement initial -->
    <div id="loading-screen">
        <div id="loading-content">
            <div class="spinner"></div>
            <h2 style="color: #1F2937; font-size: 20px; margin: 10px 0;">Chargement du Dashboard</h2>
            <p id="loading-status" class="loading-step">Initialisation...</p>
            <p id="error-message" style="display: none;"></p>
        </div>
    </div>

    <div id="root"></div>

    <!-- Charger les bibliothèques dans l'ordre strict -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Recharts avec toutes ses dépendances -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/d3-scale@4.0.2/dist/d3-scale.min.js"></script>
    <script src="https://unpkg.com/d3-interpolate@3.0.1/dist/d3-interpolate.min.js"></script>
    <script src="https://unpkg.com/d3-color@3.1.0/dist/d3-color.min.js"></script>
    <script src="https://unpkg.com/d3-format@3.1.0/dist/d3-format.min.js"></script>
    <script src="https://unpkg.com/d3-time@3.1.0/dist/d3-time.min.js"></script>
    <script src="https://unpkg.com/d3-time-format@4.1.0/dist/d3-time-format.min.js"></script>
    <script src="https://unpkg.com/d3-array@3.2.0/dist/d3-array.min.js"></script>
    <script src="https://unpkg.com/d3-shape@3.2.0/dist/d3-shape.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/dist/Recharts.js"></script>
    
    <script src="https://unpkg.com/react-leaflet@4.2.1/dist/react-leaflet.min.js"></script>

    <script>
        const loadingStatus = document.getElementById('loading-status');
        const errorMessage = document.getElementById('error-message');
        let checkCount = 0;
        const maxChecks = 30; // 15 secondes max

        function updateLoadingStatus(message) {
            console.log(message);
            loadingStatus.textContent = message;
        }

        function showError(error) {
            console.error('ERREUR:', error);
            errorMessage.innerHTML = `
                <div style="text-align: left;">
                    <strong>⚠️ Erreur de chargement:</strong><br>
                    ${error}<br><br>
                    <strong>Solutions:</strong><br>
                    1. Rafraîchissez la page (Ctrl+F5)<br>
                    2. Vérifiez votre connexion internet<br>
                    3. Essayez un autre navigateur<br>
                    4. Ouvrez /diagnostic.html pour plus de détails
                </div>
            `;
            errorMessage.style.display = 'block';
            loadingStatus.textContent = '';
        }

        function checkLibraries() {
            checkCount++;
            
            const libs = {
                'React': typeof React !== 'undefined',
                'ReactDOM': typeof ReactDOM !== 'undefined',
                'Babel': typeof Babel !== 'undefined',
                'Leaflet': typeof L !== 'undefined',
                'Recharts': typeof Recharts !== 'undefined',
                'ReactLeaflet': typeof ReactLeaflet !== 'undefined'
            };

            const loaded = Object.values(libs).filter(Boolean).length;
            const total = Object.keys(libs).length;

            updateLoadingStatus(`Bibliothèques chargées: ${loaded}/${total}`);

            // Afficher le détail
            for (const [name, status] of Object.entries(libs)) {
                console.log(`${status ? '✅' : '❌'} ${name}`);
            }

            if (loaded === total) {
                // Tout est chargé
                console.log('✅ Toutes les bibliothèques sont chargées');
                loadApplication();
            } else if (checkCount >= maxChecks) {
                // Timeout
                const missing = Object.entries(libs)
                    .filter(([, status]) => !status)
                    .map(([name]) => name);
                showError(`Impossible de charger: ${missing.join(', ')}`);
            } else {
                // Réessayer
                setTimeout(checkLibraries, 500);
            }
        }

        function loadApplication() {
            updateLoadingStatus('Chargement de l\'application...');
            
            const appScript = document.createElement('script');
            appScript.type = 'text/babel';
            appScript.src = './burkina-dashboard.jsx';
            
            appScript.onload = () => {
                updateLoadingStatus('Compilation du code...');
                setTimeout(initializeApp, 1000);
            };
            
            appScript.onerror = () => {
                showError('Le fichier burkina-dashboard.jsx est introuvable. Vérifiez qu\'il est bien présent dans le dépôt.');
            };
            
            document.body.appendChild(appScript);
        }

        function initializeApp() {
            try {
                updateLoadingStatus('Démarrage du dashboard...');
                
                if (typeof BurkinaDashboard === 'undefined') {
                    throw new Error('Le composant BurkinaDashboard n\'a pas été trouvé dans burkina-dashboard.jsx');
                }

                const { StrictMode } = React;
                const { createRoot } = ReactDOM;

                const root = createRoot(document.getElementById('root'));
                root.render(
                    React.createElement(StrictMode, null,
                        React.createElement(BurkinaDashboard)
                    )
                );

                console.log('✅ Application initialisée avec succès');
                
                // Masquer l'écran de chargement après un délai
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 500);
                
            } catch (error) {
                showError('Erreur d\'initialisation: ' + error.message);
            }
        }

        // Capturer les erreurs globales
        window.addEventListener('error', function(e) {
            console.error('Erreur globale:', e.message);
            if (e.message.includes('script')) {
                showError('Erreur de chargement de script. Vérifiez votre connexion internet.');
            }
        });

        // Démarrer la vérification après que le DOM soit chargé
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(checkLibraries, 1000);
            });
        } else {
            setTimeout(checkLibraries, 1000);
        }
    </script>
</body>
</html>
