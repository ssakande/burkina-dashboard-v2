<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Humanitaire - Burkina Faso</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #root {
            min-height: 100vh;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #EFF6FF 0%, #E0E7FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #loading-content {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .spinner {
            border: 4px solid #E0E7FF;
            border-top: 4px solid #6366F1;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .leaflet-container {
            font-family: inherit;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        #error-message {
            color: #DC2626;
            font-weight: bold;
            margin-top: 10px;
            padding: 10px;
            background: #FEE2E2;
            border-radius: 8px;
        }

        .loading-step {
            font-size: 14px;
            color: #6B7280;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Écran de chargement initial -->
    <div id="loading-screen">
        <div id="loading-content">
            <div class="spinner"></div>
            <h2 style="color: #1F2937; font-size: 20px; margin: 10px 0;">Chargement du Dashboard</h2>
            <p id="loading-status" class="loading-step">Initialisation...</p>
            <p id="error-message" style="display: none;"></p>
        </div>
    </div>

    <div id="root"></div>

    <script>
        let scriptsLoaded = 0;
        const totalScripts = 6;
        const loadingStatus = document.getElementById('loading-status');
        const errorMessage = document.getElementById('error-message');

        function updateLoadingStatus(message) {
            console.log(message);
            loadingStatus.textContent = message;
        }

        function showError(error) {
            console.error('ERREUR:', error);
            errorMessage.textContent = '⚠️ ' + error;
            errorMessage.style.display = 'block';
            loadingStatus.textContent = 'Échec du chargement';
        }

        function loadScript(src, name, integrity = null) {
            return new Promise((resolve, reject) => {
                updateLoadingStatus(`Chargement de ${name}...`);
                const script = document.createElement('script');
                script.src = src;
                script.crossOrigin = 'anonymous';
                if (integrity) {
                    script.integrity = integrity;
                }
                script.onload = () => {
                    scriptsLoaded++;
                    updateLoadingStatus(`${name} chargé (${scriptsLoaded}/${totalScripts})`);
                    console.log(`✅ ${name} loaded successfully`);
                    resolve();
                };
                script.onerror = () => {
                    const errorMsg = `Impossible de charger ${name} depuis ${src}`;
                    showError(errorMsg);
                    reject(new Error(errorMsg));
                };
                document.head.appendChild(script);
            });
        }

        async function loadAllScripts() {
            try {
                // React 18
                await loadScript(
                    'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
                    'React'
                );
                
                // ReactDOM 18
                await loadScript(
                    'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
                    'ReactDOM'
                );
                
                // Babel Standalone
                await loadScript(
                    'https://unpkg.com/@babel/standalone@7.23.5/babel.min.js',
                    'Babel'
                );
                
                // Leaflet
                await loadScript(
                    'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
                    'Leaflet',
                    'sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo='
                );
                
                // Recharts - Version stable 2.5.0
                updateLoadingStatus('Chargement de Recharts...');
                await loadScript(
                    'https://cdn.jsdelivr.net/npm/recharts@2.5.0/dist/Recharts.js',
                    'Recharts'
                );
                
                // React Leaflet
                await loadScript(
                    'https://unpkg.com/react-leaflet@4.2.1/dist/react-leaflet.min.js',
                    'React Leaflet'
                );
                
                updateLoadingStatus('Chargement de l\'application...');
                
                // Charger le code de l'application
                const appScript = document.createElement('script');
                appScript.type = 'text/babel';
                appScript.src = './burkina-dashboard.jsx';
                appScript.onload = () => {
                    updateLoadingStatus('Démarrage de l\'application...');
                    setTimeout(initializeApp, 500);
                };
                appScript.onerror = () => {
                    showError('Impossible de charger burkina-dashboard.jsx. Vérifiez que le fichier est présent.');
                };
                document.body.appendChild(appScript);
                
            } catch (error) {
                showError(error.message + ' - Vérifiez votre connexion internet.');
            }
        }

        function initializeApp() {
            try {
                const { StrictMode } = React;
                const { createRoot } = ReactDOM;

                if (typeof BurkinaDashboard === 'undefined') {
                    throw new Error('BurkinaDashboard component not found');
                }

                const root = createRoot(document.getElementById('root'));
                root.render(
                    React.createElement(StrictMode, null,
                        React.createElement(BurkinaDashboard)
                    )
                );

                // Masquer l'écran de chargement
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 500);
            } catch (error) {
                showError('Erreur lors de l\'initialisation: ' + error.message);
            }
        }

        // Capturer les erreurs globales
        window.addEventListener('error', function(e) {
            console.error('Erreur globale:', e.message, e.filename, e.lineno);
        });

        // Démarrer le chargement
        loadAllScripts();
    </script>
</body>
</html>
